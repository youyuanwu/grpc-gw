name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `protoc` is required by the grpc-gw-tests build script (it compiles the
      # proto fixtures into a descriptor set and generates the tonic stubs).
      - name: Install protoc
        uses: taiki-e/install-action@protoc

      # Read the pinned toolchain (e.g. 1.96.0) from rust-toolchain.toml so the
      # version lives in one place.
      - name: Resolve rust version
        id: rust
        run: echo "channel=$(grep -oP 'channel\s*=\s*"\K[^"]+' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace
