// Test fixture service for grpc-gw. Exercises:
//   - a method with a google.api.http annotation (GET + path template)
//   - a method with an annotation using POST + body + additional_bindings
//   - a method with NO annotation (default-binding path)
syntax = "proto3";

package greeter.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service Greeter {
  // Annotated: GET with a path-template capture.
  rpc SayHello(HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/v1/greeter/{name}"
    };
  }

  // Annotated: POST with a body selector and an additional binding.
  rpc UpdateGreeting(UpdateGreetingRequest) returns (HelloReply) {
    option (google.api.http) = {
      post: "/v1/greeter/{name}/greeting"
      body: "greeting"
      additional_bindings {
        patch: "/v1/greeter/{name}/greeting"
        body: "greeting"
      }
    };
  }

  // Unannotated: reachable only via the synthesized default binding.
  rpc Ping(PingRequest) returns (PingReply) {}

  // Unannotated: echoes a Kitchen message back. Exercises the proto3-JSON
  // edge cases (int64-as-string, enums, nested/repeated/map, timestamp,
  // bytes) that matter for grpc-gateway parity.
  rpc Echo(Kitchen) returns (Kitchen) {}
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message UpdateGreetingRequest {
  string name = 1;
  string greeting = 2;
}

message PingRequest {}

message PingReply {
  string pong = 1;
}

// A grab-bag of proto3 field kinds whose canonical JSON mapping is where
// dynamic transcoders tend to diverge from grpc-gateway.
message Kitchen {
  enum Flavor {
    FLAVOR_UNSPECIFIED = 0;
    SWEET = 1;
    SOUR = 2;
  }

  message Nested {
    string label = 1;
    int32 count = 2;
  }

  int32 i32 = 1;
  int64 i64 = 2;          // canonical JSON encodes 64-bit ints as strings
  uint64 u64 = 3;
  bool flag = 4;
  double dbl = 5;
  string text = 6;
  bytes blob = 7;         // base64 in JSON
  Flavor flavor = 8;      // enum: name by default
  Nested nested = 9;
  repeated string tags = 10;
  map<string, int32> scores = 11;
  google.protobuf.Timestamp at = 12;  // RFC 3339 string
}
